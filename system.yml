---
- name: Configuration système
  hosts: all
  become: true
  tasks:
    - name: Créer l'utilisateur esiee
      user:
        name: esiee
        state: present
        shell: /bin/bash

    - name: Déployer la clé SSH pour esiee
      ansible.posix.authorized_key:
        user: esiee
        state: present
        key: "{{ lookup('file', 'files/damien.pub') }}"

    - name: Déployer le message of the day
      template:
        src: templates/motd.j2
        dest: /etc/motd

    - name: Configurer sudo sans mot de passe pour esiee
      copy:
        dest: /etc/sudoers.d/esiee
        content: "esiee ALL=(ALL) NOPASSWD:ALL\n"
        mode: "0440"
        validate: visudo -cf %s
