---
- name: Déployer WordPress pour les clients
  hosts: web
  become: true
  tasks:
    - name: Installer Apache, PHP et les dépendances
      apt:
        name:
          - apache2
          - php
          - libapache2-mod-php
          - php-mysql
          - php-curl
          - php-gd
          - php-xml
          - php-mbstring
          - git
        state: present
        update_cache: true

    - name: Activer le module rewrite Apache
      apache2_module:
        name: rewrite
        state: present
      notify: Recharger Apache

    - name: Créer un utilisateur système par client
      user:
        name: "{{ item }}"
        state: present
        shell: /bin/bash
        create_home: false
      loop: "{{ clients }}"

    - name: Cloner WordPress pour chaque client
      git:
        repo: https://github.com/WordPress/WordPress.git
        dest: "/var/www/{{ item }}"
        version: master
      loop: "{{ clients }}"

    - name: Déployer wp-config.php par client
      template:
        src: templates/wp-config.php.j2
        dest: "/var/www/{{ item }}/wp-config.php"
        owner: "{{ item }}"
        group: www-data
        mode: "0640"
      loop: "{{ clients }}"

    - name: Appliquer les permissions sur les fichiers WordPress
      file:
        path: "/var/www/{{ item }}"
        owner: "{{ item }}"
        group: www-data
        recurse: true
      loop: "{{ clients }}"

    - name: Déployer le virtualhost par client
      template:
        src: templates/virtualhost.conf.j2
        dest: "/etc/apache2/sites-available/{{ item }}.conf"
      loop: "{{ clients }}"
      notify: Recharger Apache

    - name: Activer les sites clients
      command: a2ensite {{ item }}.conf
      args:
        creates: "/etc/apache2/sites-enabled/{{ item }}.conf"
      loop: "{{ clients }}"
      notify: Recharger Apache

  handlers:
    - name: Recharger Apache
      service:
        name: apache2
        state: reloaded
